networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  traefik-certificates:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    env_file:
      - .env
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"

      - "traefik.http.middlewares.backend-stripprefix.stripprefix.prefixes=/api"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

      - "traefik.http.routers.backend-http.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend-http.entrypoints=web"
      - "traefik.http.routers.backend-http.middlewares=redirect-to-https"

      - "traefik.http.routers.backend-https.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend-https.entrypoints=websecure"
      - "traefik.http.routers.backend-https.tls.certresolver=myresolver"
      - "traefik.http.routers.backend-https.tls.domains[0].main=localhost"
      - "traefik.http.routers.backend-https.middlewares=backend-stripprefix"

      - "traefik.http.services.backend.loadbalancer.server.port=8080"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      INTERNAL_API_URL: http://backend:8080
    networks:
      - app-network
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.frontend-internal-api-http.rule=Path(`/api/login`) || Path(`/api/logout`) || Path(`/api/me`)"
      - "traefik.http.routers.frontend-internal-api-http.entrypoints=web"
      - "traefik.http.routers.frontend-internal-api-http.middlewares=redirect-to-https"
      - "traefik.http.routers.frontend-internal-api-http.priority=100"
      - "traefik.http.routers.frontend-internal-api-http.service=frontend"

      - "traefik.http.routers.frontend-internal-api-https.rule=Path(`/api/login`) || Path(`/api/logout`) || Path(`/api/me`)"
      - "traefik.http.routers.frontend-internal-api-https.entrypoints=websecure"
      - "traefik.http.routers.frontend-internal-api-https.tls.certresolver=myresolver"
      - "traefik.http.routers.frontend-internal-api-https.tls.domains[0].main=localhost"
      - "traefik.http.routers.frontend-internal-api-https.priority=100"
      - "traefik.http.routers.frontend-internal-api-https.service=frontend"

      - "traefik.http.routers.frontend-http.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.middlewares=redirect-to-https"
      - "traefik.http.routers.frontend-http.priority=1"

      - "traefik.http.routers.frontend-https.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend-https.entrypoints=websecure"
      - "traefik.http.routers.frontend-https.tls.certresolver=myresolver"
      - "traefik.http.routers.frontend-https.tls.domains[0].main=localhost"
      - "traefik.http.routers.frontend-https.priority=1"

      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  traefik:
    image: traefik:v2.11
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=info@teko.ch"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates:/letsencrypt
    networks:
      - app-network